{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Login</title>
<link rel="icon" href="{% static 'images/logo.png' %}">
<link rel="stylesheet"
href="{% static 'css/auth.css' %}">

</head>

<body>

<nav class="navbar">

<h1>
🛒 ShopSphere
</h1>

<div>

<a href="/">Home</a>
<a href="/register">Register</a>

</div>

</nav>


<div class="container">

<div class="card">

<h1>
Welcome Back 👋
</h1>

<p>
Login to your account
</p>


<form method="POST">

{% csrf_token %}

<select name="role">

<option>

Select Role

</option>


<option value="customer">

Customer

</option>


<option value="user">

User

</option>


</select>



<input type="email" name="email" placeholder="Email" required>


<input
type="password"
name="password"
placeholder="Password"
required>



<button>

Login

</button>


<div class="link">

No account?

<a href="/register">

Register

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}
</a>

</div>

    
</form>

</div>

</div>
<script src=
"{% static 'js/login.js' %}">
</script>

</body>
</html>
