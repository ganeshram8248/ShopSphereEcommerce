{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<link rel="stylesheet" href="{% static 'css/orders.css' %}">
<script defer src="{% static 'js/orders.js' %}"></script>
</head>

<body>

<nav class="navbar">
    <h2>📦 My Orders</h2>
</nav>

<h1 class="title">Order Dashboard</h1>

<div class="orders-container">

{% for order in orders %}

<div class="order-card">

    <!-- IMAGE -->
    <div class="img-box">
        <img src="{{ order.product.image.url }}">
    </div>

    <!-- INFO -->
    <div class="info">

        <h3>{{ order.name }}</h3>

        <p class="price">₹{{ order.price }}</p>

        <p>Qty: {{ order.quantity }}</p>

        <p class="total">Total: ₹{{ order.total_amount }}</p>

        <span class="status">{{ order.status }}</span>

        <!-- BUTTONS -->
        <div class="btn-group">

            <a href="/products/{{ order.product.id }}/" class="btn view">
                View
            </a>

            {% if order.status != "Cancelled" %}

            <button class="btn cancel"
                onclick="cancelOrder('{{ order.id }}')">
                Cancel
            </button>

            {% endif %}

        </div>

    </div>

</div>

{% endfor %}

</div>

</body>
</html>
