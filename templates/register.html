{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">


<title>

Register

</title>


<link rel="stylesheet"
href="{% static 'css/auth.css' %}">

</head>


<body>


<nav class="navbar">

<h1>

🛒 ShopSphere

</h1>

<div>

<a href="/">

Home

</a>

<a href="/login">

Login

</a>

</div>

</nav>




<div class="container">


<div class="card">

<h1>

Create Account 🚀

</h1>


<form method="POST">

{% csrf_token %}


<input
type="text"
name="username"
placeholder="Username"
required>


<input
type="email"
name="email"
placeholder="Email"
required>



<input
type="password"
name="password"
placeholder="Password"
required>



<select
name="role"
required>

<option value="">

Select Role

</option>


<option value="customer">

Customer

</option>



<option value="user">

User

</option>


</select>



<button>

Register

</button>


<div class="link">

Already account?

<a href="/login">

Login

</a>

</div>

</form>

</div>

</div>
<script src=
"{% static 'js/register.js' %}">
</script>
</body>

</html>
