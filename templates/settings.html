{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Customer Settings</title>
    <link rel="stylesheet" href="{% static 'css/settings.css' %}">
    <script defer src="{% static 'js/settings.js' %}"></script>
</head>

<body>

<div class="container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <h2>⚙️ Settings</h2>

        <button class="tab active" onclick="openTab('profile')">Profile</button>
        <button class="tab" onclick="openTab('security')">Security</button>
        <button class="tab" onclick="openTab('preferences')">Preferences</button>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="content">

        <!-- PROFILE -->
        <div id="profile" class="tab-content active">
            <h2>👤 Profile</h2>

            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Phone Number">
            <textarea placeholder="Address"></textarea>

            <button class="btn" onclick="saveSettings()">Save Profile</button>
        </div>

        <!-- SECURITY -->
        <div id="security" class="tab-content">
            <h2>🔒 Security</h2>

            <input type="password" placeholder="Current Password">
            <input type="password" placeholder="New Password">
            <input type="password" placeholder="Confirm Password">

            <button class="btn" onclick="saveSettings()">Update Password</button>
        </div>

        <!-- PREFERENCES -->
        <div id="preferences" class="tab-content">
            <h2>⚙️ Preferences</h2>

            <div class="toggle">
                <span>Enable Notifications</span>
                <input type="checkbox" checked>
            </div>

            <div class="toggle">
                <span>Dark Mode</span>
                <input type="checkbox">
            </div>

            <div class="toggle">
                <span>Show Order Updates</span>
                <input type="checkbox" checked>
            </div>

            <button class="btn" onclick="saveSettings()">Save Preferences</button>
        </div>

    </div>
</div>

<!-- Toast -->
<div id="toast">Settings Saved Successfully ✔</div>

</body>
</html>
