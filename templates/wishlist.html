{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>My Wishlist</title>

<link rel="stylesheet"
href="{% static 'css/wishlist.css' %}">

<script defer
src="{% static 'js/wishlist.js' %}">
</script>

</head>

<body>

<header>

<h1>
❤️ My Wishlist
</h1>


<div class="top-bar">

<input
type="text"
id="search"
placeholder="🔍 Search products...">


<div class="count">

Wishlist:
<span id="wishlistCount">

{{ items|length }}

</span>

Items

</div>

</div>

</header>



<div class="wishlist-container">

{% for item in items %}

<div class="wishlist-card">

<div class="badge">
❤️
</div>


<img
src="{{ item.product.image.url }}">


<h3>

{{ item.product.name }}

</h3>


<p class="price">

₹{{ item.product.price }}

</p>



<div class="btns">

<a
href="{% url 'product_detail' item.product.id %}">

View

</a>



<button
onclick="removeItem(this,{{ item.id }})">

Remove

</button>


</div>


</div>


{% empty %}

<h2 class="empty">

No Wishlist Products ❤️

</h2>

{% endfor %}


</div>

</body>
</html>
